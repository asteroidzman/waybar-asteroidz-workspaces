<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfd6e6"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd27f"/>
      <stop offset="0.5" stop-color="#ff9a3c"/>
      <stop offset="1" stop-color="#f2603f"/>
    </linearGradient>
  </defs>

  <!-- ship defined pointing up, whole craft rotated 45° to the right -->
  <g transform="rotate(45 50 50)">
    <!-- orange exhaust plume out of the rear notch -->
    <path d="M42,64 L50,96 L58,64 Z" fill="url(#flame)"/>
    <path d="M46,64 L50,86 L54,64 Z" fill="#fff2cf"/>
    <!-- hollow (wireframe) Atari-Asteroids triangle ship -->
    <path d="M50,8 L78,84 L50,64 L22,84 Z"
          fill="none" stroke="url(#hull)" stroke-width="7"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
